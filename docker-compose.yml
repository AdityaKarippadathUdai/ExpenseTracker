services:
  backend:
    build:
      context: ./backend
    container_name: expense-backend

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
    container_name: expense-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend